<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="מונדיאל 2026">
<meta name="theme-color" content="#0f1420">
<title>מונדיאל 2026 🏆</title>
<style>
  /* ── THEMES ── */
  body.dark {
    --bg:#0d1117; --surface:#111828; --surface2:#161c2e; --border:#1e2840;
    --header:linear-gradient(135deg,#0f1420,#1a2340); --header-border:#2a5fbc;
    --text:#e8eaf0; --muted:#7a8aaa; --muted2:#5a6a8a;
    --date-bg:#161c2e; --match-bg:#111828; --match-hover:#161e32;
    --pred-bg:#0d1320; --info-bg:#111828; --cd-bg:#161c2e;
    --accent:#4a9eff; --accent2:#f5a623; --green:#2ecc71; --red:#e74c3c;
    --modal-bg:rgba(0,0,0,.8);
  }
  body.light {
    --bg:#f0f2f5; --surface:#ffffff; --surface2:#f5f7fa; --border:#dde2ec;
    --header:linear-gradient(135deg,#1a3a7a,#2a5fbc); --header-border:#1a3a7a;
    --text:#1a2035; --muted:#6a7a9a; --muted2:#8a9ab5;
    --date-bg:#e4e9f2; --match-bg:#ffffff; --match-hover:#f5f7ff;
    --pred-bg:#eef1f8; --info-bg:#ffffff; --cd-bg:#ffffff;
    --accent:#2a5fbc; --accent2:#e08c00; --green:#1a9e52; --red:#cc2222;
    --modal-bg:rgba(0,0,0,.6);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); direction:rtl; min-height:100vh; max-width:700px; margin:0 auto; transition:background .2s,color .2s; }

  /* ── HEADER ── */
  .header { background:var(--header); border-bottom:3px solid var(--header-border); padding:14px 16px 0; position:sticky; top:0; z-index:100; }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .logo { display:flex; align-items:center; gap:8px; }
  .logo h1 { font-size:19px; font-weight:900; color:#fff; letter-spacing:-.5px; }
  .logo h1 span { color:#4a9eff; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .live-badge { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--green); font-weight:600; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .theme-toggle { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:14px; padding:4px 8px; border-radius:20px; cursor:pointer; }
  .tabs { display:flex; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { padding:10px 16px; font-size:13px; font-weight:600; color:rgba(255,255,255,.5); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:all .2s; }
  .tab.active { color:#fff; border-bottom-color:#4a9eff; }

  /* ── PAGES ── */
  .page { display:none; }
  .page.active { display:block; }

  /* ── SCORES PAGE ── */
  .refresh-bar { display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--muted); padding:8px 14px; background:var(--surface); border-bottom:1px solid var(--border); }
  .refresh-btn { background:var(--surface2); border:1px solid var(--border); color:var(--accent); font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer; }
  .date-header { background:var(--date-bg); padding:8px 16px; display:flex; justify-content:space-between; align-items:center; border-right:4px solid var(--accent); margin-top:6px; }
  .date-title { font-size:14px; font-weight:800; color:var(--text); }
  .date-sub { font-size:11px; color:var(--muted); }
  .match-row { background:var(--match-bg); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:11px 14px; gap:8px; cursor:pointer; transition:background .15s; }
  .match-row:hover { background:var(--match-hover); }
  .m-num { font-size:11px; color:var(--muted2); min-width:18px; font-weight:700; }
  .m-group { font-size:10px; font-weight:700; color:var(--accent); min-width:40px; background:rgba(74,158,255,.1); padding:2px 5px; border-radius:3px; text-align:center; }
  .m-teams { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; }
  .t-home { flex:1; display:flex; align-items:center; gap:5px; justify-content:flex-end; }
  .t-away { flex:1; display:flex; align-items:center; gap:5px; }
  .t-crest { width:22px; height:22px; object-fit:contain; }
  .t-name { font-size:13px; font-weight:700; color:var(--text); }
  .m-score { text-align:center; min-width:76px; }
  .m-time { font-size:15px; font-weight:800; color:var(--accent2); }
  .m-result { font-size:17px; font-weight:900; color:var(--text); letter-spacing:2px; }
  .m-result.live { color:var(--green); }
  .m-broadcast { font-size:10px; color:var(--muted2); min-width:72px; text-align:left; line-height:1.6; }
  .m-broadcast b { color:var(--muted); font-size:11px; display:block; }
  .live-tag { display:inline-block; background:var(--green); color:#000; font-size:9px; font-weight:800; padding:1px 5px; border-radius:3px; margin-bottom:2px; }
  .pred-row { background:var(--pred-bg); padding:5px 14px 7px; border-bottom:1px solid var(--border); display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .pred-chip { font-size:11px; padding:3px 10px; border-radius:20px; border:1px solid var(--accent); color:var(--accent); cursor:pointer; }
  .pred-chip.correct { border-color:var(--green); color:var(--green); }
  .pred-chip.wrong { border-color:var(--red); color:var(--red); }
  .pred-chip.del { border-color:var(--red); color:var(--red); opacity:.6; min-width:auto; flex:0; }
  .pred-add { font-size:11px; color:var(--muted); padding:3px 10px; border-radius:20px; border:1px dashed var(--border); cursor:pointer; }
  .pred-add:hover { border-color:var(--accent); color:var(--accent); }
  .section-gap { height:6px; background:var(--bg); }
  .error-bar { background:#2d1010; border:1px solid #5a1f1f; color:#ff8080; font-size:12px; padding:8px 12px; margin:8px 14px; border-radius:8px; }
  .loading { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-left:6px; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty { text-align:center; color:var(--muted); padding:30px; font-size:13px; }

  /* ── MATCH PAGE ── */
  #page-match { display:none; }
  #page-match.active { display:block; }
  .back-btn { display:flex; align-items:center; gap:6px; padding:12px 16px; font-size:13px; color:var(--muted); cursor:pointer; border-bottom:1px solid var(--border); background:var(--bg); }
  .back-btn:hover { color:var(--accent); }
  .mblock { margin:10px 16px 0; border-radius:10px; overflow:hidden; border:1px solid var(--border); }
  .match-hero { background:var(--header); padding:20px 16px 16px; text-align:center; }
  .hero-group { font-size:11px; color:#4a9eff; font-weight:700; letter-spacing:2px; margin-bottom:14px; text-transform:uppercase; }
  .hero-teams { display:flex; align-items:center; justify-content:center; }
  .hero-team { flex:1; text-align:center; }
  .hero-crest { width:68px; height:68px; object-fit:contain; display:block; margin:0 auto 8px; }
  .hero-tla { font-size:28px; font-weight:900; color:#fff; letter-spacing:2px; }
  .hero-name { font-size:13px; color:rgba(255,255,255,.55); margin-top:4px; }
  .hero-vs { width:90px; text-align:center; flex-shrink:0; }
  .hero-time { font-size:28px; font-weight:900; color:var(--accent2); display:block; }
  .hero-score-live { font-size:32px; font-weight:900; color:var(--green); display:block; }
  .hero-date { font-size:12px; color:rgba(255,255,255,.45); margin-top:6px; line-height:1.7; }
  .info-row { display:flex; background:var(--info-bg); }
  .info-cell { padding:9px 14px; text-align:center; border-left:1px solid var(--border); }
  .info-cell:last-child { border-left:none; }
  .info-cell .val { font-size:13px; font-weight:700; color:var(--text); }
  .info-cell .lbl { font-size:10px; color:var(--muted2); margin-top:3px; }
  .cd-box { background:var(--cd-bg); padding:14px; text-align:center; }
  .cd-nums { display:flex; justify-content:center; gap:8px; direction:ltr; }
  .cd-item { text-align:center; min-width:60px; }
  .cd-num { font-size:32px; font-weight:900; color:var(--accent); display:block; font-family:monospace; }
  .cd-lbl { font-size:10px; color:var(--muted2); margin-top:2px; }
  .group-mini-title { background:var(--surface2); padding:8px 12px; font-size:11px; font-weight:800; color:var(--accent); letter-spacing:1px; border-bottom:1px solid var(--border); }
  .gt { width:100%; border-collapse:collapse; font-size:12px; background:var(--surface); }
  .gt th { color:var(--muted2); font-weight:600; padding:5px 8px; text-align:center; font-size:10px; }
  .gt th:first-child { text-align:right; }
  .gt td { padding:7px 8px; border-top:1px solid var(--border); text-align:center; color:var(--text); }
  .gt td:first-child { text-align:right; font-weight:600; }
  .gt tr.q { border-right:3px solid var(--green); }
  .pts { font-weight:800; color:var(--accent) !important; }
  .sm-crest { width:18px; height:18px; object-fit:contain; vertical-align:middle; margin-left:4px; }
  .match-section-title { padding:12px 16px 6px; font-size:11px; font-weight:800; color:var(--accent); letter-spacing:1px; text-transform:uppercase; }
  .pred-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:11px 14px; margin:0 16px 6px; display:flex; align-items:center; justify-content:space-between; }
  .pred-person { font-size:14px; font-weight:800; color:var(--text); }
  .pred-result { font-size:13px; font-weight:700; color:var(--accent2); }
  .pred-result.correct { color:var(--green); }
  .pred-result.wrong { color:var(--red); }
  .add-pred-btn { display:block; width:calc(100% - 32px); margin:4px 16px 0; background:var(--accent); color:#fff; font-size:14px; font-weight:800; padding:13px; border:none; border-radius:10px; cursor:pointer; }
  .cal-btn { display:flex; align-items:center; justify-content:center; gap:8px; margin:8px 16px 0; border-radius:10px; padding:12px; cursor:pointer; font-size:13px; font-weight:700; text-decoration:none; border:1px solid; }
  .cal-g { border-color:#4285f4; color:#4285f4; background:rgba(66,133,244,.08); }
  .cal-a { border-color:var(--border); color:var(--muted); background:var(--surface2); }
  .match-pb { height:20px; }

  /* ── GROUPS PAGE ── */
  .groups-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px; }
  @media(max-width:480px) { .groups-grid { grid-template-columns:1fr; } }
  .group-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .group-card-title { background:var(--surface2); padding:8px 12px; font-size:12px; font-weight:800; color:var(--accent); letter-spacing:1px; border-bottom:1px solid var(--border); }

  /* ── LEADERBOARD ── */
  #page-leaderboard { padding:12px; }
  .lb-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:10px; }
  .lb-header { padding:12px 14px; background:var(--surface2); border-bottom:1px solid var(--border); font-weight:800; font-size:13px; display:flex; justify-content:space-between; }
  .lb-row { display:flex; align-items:center; padding:10px 14px; border-top:1px solid var(--border); gap:10px; }
  .lb-rank { font-size:16px; font-weight:900; color:var(--muted); min-width:28px; text-align:center; }
  .lb-name { flex:1; font-weight:700; font-size:14px; }
  .lb-pts { font-weight:900; font-size:18px; color:var(--accent); }
  .lb-detail { font-size:11px; color:var(--muted); }
  .score-legend { display:flex; gap:10px; flex-wrap:wrap; padding:10px 14px; font-size:11px; color:var(--muted); }
  .score-legend span { display:flex; align-items:center; gap:4px; }
  .dot { width:8px; height:8px; border-radius:50%; }

  /* ── STATS ── */
  #page-stats { padding:12px; }
  .stats-bar { display:flex; gap:8px; padding:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; }
  .stat-item { text-align:center; flex:1; }
  .stat-num { font-size:22px; font-weight:900; color:var(--accent); }
  .stat-label { font-size:10px; color:var(--muted); margin-top:2px; }

  /* ── MODAL ── */
  .modal-bg { display:none; position:fixed; inset:0; background:var(--modal-bg); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:18px 18px 0 0; padding:20px 18px 32px; width:100%; max-width:480px; }
  .modal h3 { font-size:15px; text-align:center; margin-bottom:14px; }
  .modal-teams-row { text-align:center; font-size:13px; font-weight:700; color:var(--muted); margin-bottom:16px; }
  .modal-score-row { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:16px; }
  .pred-input { width:64px; height:64px; background:var(--surface2); border:2px solid var(--border); border-radius:10px; color:var(--text); font-size:28px; font-weight:900; text-align:center; }
  .pred-input:focus { outline:none; border-color:var(--accent); }
  .modal-sep { font-size:22px; color:var(--muted); }
  .modal-name-row { margin-bottom:14px; }
  .modal-name-row label { font-size:12px; color:var(--muted); display:block; margin-bottom:5px; }
  .name-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:15px; padding:10px 12px; direction:rtl; }
  .name-input:focus { outline:none; border-color:var(--accent); }
  .btn-save { width:100%; background:var(--accent); color:#fff; font-size:15px; font-weight:800; padding:13px; border:none; border-radius:10px; cursor:pointer; }
  .btn-cancel { width:100%; background:transparent; color:var(--muted); font-size:13px; padding:10px; border:none; cursor:pointer; margin-top:6px; }
</style>
</head>
<body class="dark">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo"><h1>🏆 מונדיאל <span>2026</span></h1></div>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>
      <div class="live-badge"><div class="live-dot"></div> עדכון חי</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showPage('scores')">⚽ משחקים</div>
    <div class="tab" onclick="showPage('groups')">🏟 בתים</div>
    <div class="tab" onclick="showPage('leaderboard')">🏅 הימורים</div>
    <div class="tab" onclick="showPage('stats')">📊 סטטיסטיקה</div>
  </div>
</div>

<!-- SCORES PAGE -->
<div class="page active" id="page-scores">
  <div class="refresh-bar">
    <span id="last-update">טוען נתונים...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ רענן</button>
  </div>
  <div id="scores-error" style="display:none"></div>
  <div id="scores-content"><div class="loading">טוען משחקים <span class="spinner"></span></div></div>
</div>

<!-- MATCH PAGE -->
<div class="page" id="page-match">
  <div class="back-btn" onclick="showPage('scores')">← חזור ללוח המשחקים</div>
  <div id="match-content"></div>
</div>

<!-- GROUPS PAGE -->
<div class="page" id="page-groups">
  <div id="groups-content"><div class="loading">טוען טבלאות <span class="spinner"></span></div></div>
</div>

<!-- LEADERBOARD PAGE -->
<div class="page" id="page-leaderboard">
  <div class="lb-card">
    <div class="lb-header"><span>🏅 לוח תחזיות</span><span id="lb-games-count" style="font-size:12px;color:var(--muted)"></span></div>
    <div class="score-legend">
      <span><div class="dot" style="background:var(--green)"></div> תוצאה מדויקת = 3 נק'</span>
      <span><div class="dot" style="background:var(--accent2)"></div> כיוון נכון = 1 נק'</span>
    </div>
  </div>
  <div id="lb-content"><div class="empty">אין תחזיות עדיין</div></div>
</div>

<!-- STATS PAGE -->
<div class="page" id="page-stats">
  <div id="stats-content"><div class="loading">טוען סטטיסטיקות <span class="spinner"></span></div></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>🔮 ניחוש תוצאה</h3>
    <div class="modal-teams-row" id="modal-teams"></div>
    <div class="modal-name-row">
      <label>השם שלך</label>
      <input class="name-input" id="pred-name" placeholder="לדוגמה: יוסי" maxlength="20">
    </div>
    <div class="modal-score-row">
      <input type="number" class="pred-input" id="pred-home" min="0" max="20" placeholder="0">
      <span class="modal-sep">:</span>
      <input type="number" class="pred-input" id="pred-away" min="0" max="20" placeholder="0">
    </div>
    <button class="btn-save" onclick="savePrediction()">שמור ניחוש ✓</button>
    <button class="btn-cancel" onclick="closeModal()">ביטול</button>
  </div>
</div>

const MONTHS = ['','ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצמ'];

let allMatches=[], predictions=loadPreds(), currentMatchId=null, cdTimer=null;

function loadPreds(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return{}}}
function savePreds(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(predictions))}catch(e){}}
function he(n){return NAME_HE[n]||n}
function tla(n){return TLA[n]||n?.slice(0,3).toUpperCase()||'?'}
function crest(m){return m?.crest||''}
function getBroadcast(m){
  const d=m.utcDate?.slice(0,10)||'';
  if(OPEN_DATES.includes(d)||m.stage==='SEMI_FINALS'||m.stage==='FINAL') return 'כאן 11';
  return 'כאן BOX';
}
function localTime(utc){
  return new Date(utc).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}
function dateLabel(utc){
  const d=new Date(utc);
  return `${DAYS[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}`;
}

async function apiFetch(path){
  const r=await fetch(`${API_PROXY}?path=${encodeURIComponent(path)}`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadAll(){
  document.getElementById('last-update').textContent='מעדכן...';
  document.getElementById('scores-error').style.display='none';
  try {
    const data=await apiFetch('/competitions/2000/matches?season=2026');
    allMatches=data.matches||[];
    const t=new Date();
    document.getElementById('last-update').textContent=`עודכן: ${t.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}`;
    renderScores(); renderGroups(); renderLeaderboard(); renderStats();
  } catch(e) {
    document.getElementById('last-update').textContent='שגיאה';
    const el=document.getElementById('scores-error');
    el.style.display='block'; el.className='error-bar';
    el.innerHTML=`⚠️ שגיאה: ${e.message}`;
  }
}

// ── RENDER SCORES ──
function renderScores(){
  if(!allMatches.length){document.getElementById('scores-content').innerHTML='<div class="empty">אין משחקים</div>';return;}
  const gs=allMatches.filter(m=>m.stage==='GROUP_STAGE'&&m.homeTeam?.name);
  if(!gs.length){document.getElementById('scores-content').innerHTML='<div class="empty">טוען...</div>';return;}
  const live=gs.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
  const byDate={};
  gs.forEach(m=>{const d=m.utcDate?.slice(0,10)||'?';(byDate[d]=byDate[d]||[]).push(m);});
  let html='';
  if(live.length){
    html+=`<div class="date-header" style="border-color:var(--green)"><div class="date-title">⚡ עכשיו</div><div class="date-sub">${live.length} חי</div></div>`;
    live.forEach(m=>html+=matchRow(m));
  }
  const today=new Date().toISOString().slice(0,10);
  Object.keys(byDate).sort().forEach(date=>{
    const label=dateLabel(date+'T12:00:00');
    const isToday=date===today;
    html+=`<div class="date-header" ${isToday?'style="border-color:var(--accent2)"':''}><div class="date-title">${isToday?'📅 היום — ':''}${label}</div><div class="date-sub">${byDate[date].length} משחקים</div></div>`;
    byDate[date].filter(m=>m.status!=='IN_PLAY'&&m.status!=='PAUSED').forEach(m=>html+=matchRow(m));
  });
  document.getElementById('scores-content').innerHTML=html||'<div class="empty">אין משחקים</div>';
}

function matchRow(m){
  const hN=m.homeTeam?.name||'?', aN=m.awayTeam?.name||'?';
  const hs=m.score?.fullTime?.home, as_=m.score?.fullTime?.away;
  const st=m.status, grp=(m.group||'').replace('GROUP_','');
  const mt=m.utcDate?localTime(m.utcDate):'';
  let scoreHtml;
  if(st==='IN_PLAY'){scoreHtml=`<div class="live-tag">חי ⚡</div><div class="m-result live">${hs??0} : ${as_??0}</div>`;}
  else if(st==='PAUSED'){scoreHtml=`<div class="live-tag">הפסקה</div><div class="m-result live">${hs??0} : ${as_??0}</div>`;}
  else if(st==='FINISHED'){scoreHtml=`<div class="m-result">${hs} : ${as_}</div>`;}
  else{scoreHtml=`<div class="m-time">${mt}</div>`;}
  const preds=predictions[m.id]||{};
  const entries=Object.entries(preds);
  let predHtml='';
  if(entries.length){
    entries.forEach(([name,p])=>{
      let cls='pred-chip', lbl=`${name}: ${he(hN)} ${p.home}:${p.away} ${he(aN)}`;
      if(st==='FINISHED'&&hs!==null&&hs!==undefined){
        const exact=p.home===hs&&p.away===as_;
        const dir=(p.home>p.away&&hs>as_)||(p.home<p.away&&hs<as_)||(p.home===p.away&&hs===as_);
        cls=exact?'pred-chip correct':dir?'pred-chip':'pred-chip wrong';
        lbl+=exact?' ✓✓':dir?' ✓':' ✗';
      }
      predHtml+=`<div class="${cls}" onclick="openModal(${m.id})">${lbl}</div><div class="pred-chip del" onclick="deletePrediction(${m.id},'${name}')">✕</div>`;
    });
    if(st!=='IN_PLAY'&&st!=='FINISHED'&&st!=='PAUSED') predHtml+=`<div class="pred-add" onclick="openModal(${m.id})">+ נחש</div>`;
  } else {
    predHtml=`<div class="pred-add" onclick="openModal(${m.id})">🔮 נחש תוצאה</div>`;
  }
  const bc=getBroadcast(m);
  return `<div class="match-row" onclick="showMatch(${m.id})">
    <div class="m-num">${m.matchday||''}</div>
    <div class="m-group">בית ${grp}</div>
    <div class="m-teams">
      <div class="t-home"><span class="t-name">${he(hN)}</span><img class="t-crest" src="${crest(m.homeTeam)}" onerror="this.style.display='none'"></div>
      <div class="m-score">${scoreHtml}</div>
      <div class="t-away"><img class="t-crest" src="${crest(m.awayTeam)}" onerror="this.style.display='none'"><span class="t-name">${he(aN)}</span></div>
    </div>
    <div class="m-broadcast"><b>📺 ${bc}</b></div>
  </div>
  <div class="pred-row">${predHtml}</div>`;
}

// ── MATCH PAGE ──
function showMatch(id){
  const m=allMatches.find(x=>x.id===id); if(!m) return;
  const hN=m.homeTeam?.name||'?', aN=m.awayTeam?.name||'?';
  const hs=m.score?.fullTime?.home, as_=m.score?.fullTime?.away;
  const st=m.status, grp=(m.group||'').replace('GROUP_','');
  const mt=m.utcDate?localTime(m.utcDate):'', dl=m.utcDate?dateLabel(m.utcDate):'';
  const bc=getBroadcast(m);

  let vsHtml;
  if(st==='IN_PLAY'||st==='PAUSED'){
    vsHtml=`<span class="hero-score-live">${hs??0} : ${as_??0}</span><div class="hero-date">${dl}</div>`;
  } else if(st==='FINISHED'){
    vsHtml=`<span class="hero-score-live" style="color:var(--accent)">${hs} : ${as_}</span><div class="hero-date">${dl}</div>`;
  } else {
    vsHtml=`<span class="hero-time">${mt}</span><div class="hero-date">${dl}</div>`;
  }

  // Group table for this match
  const groupTeams={}, teamStats={};
  allMatches.filter(x=>x.group===m.group&&x.stage==='GROUP_STAGE').forEach(x=>{
    const h=x.homeTeam?.name||'?', a=x.awayTeam?.name||'?';
    if(!groupTeams[h]) groupTeams[h]=x.homeTeam;
    if(!groupTeams[a]) groupTeams[a]=x.awayTeam;
    if(!teamStats[h]) teamStats[h]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,crest:x.homeTeam?.crest||''};
    if(!teamStats[a]) teamStats[a]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,crest:x.awayTeam?.crest||''};
    if(x.status==='FINISHED'){
      const gh=x.score?.fullTime?.home, ga=x.score?.fullTime?.away;
      if(gh===null||gh===undefined) return;
      teamStats[h].p++; teamStats[a].p++;
      teamStats[h].gf+=gh; teamStats[h].ga+=ga;
      teamStats[a].gf+=ga; teamStats[a].ga+=gh;
      if(gh>ga){teamStats[h].w++;teamStats[h].pts+=3;teamStats[a].l++;}
      else if(gh===ga){teamStats[h].d++;teamStats[h].pts++;teamStats[a].d++;teamStats[a].pts++;}
      else{teamStats[a].w++;teamStats[a].pts+=3;teamStats[h].l++;}
    }
  });
  const sorted=Object.keys(teamStats).sort((a,b)=>{
    const sa=teamStats[a],sb=teamStats[b];
    if(sb.pts!==sa.pts) return sb.pts-sa.pts;
    return(sb.gf-sb.ga)-(sa.gf-sa.ga);
  });
  let gtHtml='<table class="gt"><tr><th>נבחרת</th><th>מ\'</th><th>נ</th><th>ת</th><th>ה</th><th>±</th><th>נק\'</th></tr>';
  sorted.forEach((t,i)=>{
    const s=teamStats[t]; const gd=s.gf-s.ga;
    gtHtml+=`<tr class="${i<2?'q':''}"><td><img class="sm-crest" src="${s.crest}" onerror="this.style.display='none'"> ${he(t)}</td><td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${gd>0?'+':''}${gd}</td><td class="pts">${s.pts}</td></tr>`;
  });
  gtHtml+='</table>';

  // Predictions for this match
  const preds=predictions[m.id]||{};
  const entries=Object.entries(preds);
  let predsHtml='';
  entries.forEach(([name,p])=>{
    let cls='pred-result', lbl=`${he(hN)} ${p.home} : ${p.away} ${he(aN)}`;
    if(st==='FINISHED'&&hs!==null){
      const exact=p.home===hs&&p.away===as_;
      const dir=(p.home>p.away&&hs>as_)||(p.home<p.away&&hs<as_)||(p.home===p.away&&hs===as_);
      cls=exact?'pred-result correct':dir?'pred-result':'pred-result wrong';
      lbl+=exact?' ✓✓':dir?' ✓':' ✗';
    }
    predsHtml+=`<div class="pred-item"><div class="pred-person">${name}</div><div class="${cls}">${lbl}</div></div>`;
  });

  // Calendar links
  const dtStart=m.utcDate?.replace(/[-:]/g,'').replace('.000Z','Z')||'';
  const dtEnd=dtStart.replace(/T(\d{2})/,(x,h)=>'T'+String(parseInt(h)+2).padStart(2,'0'));
  const calTitle=encodeURIComponent(`🏆 ${he(hN)} נגד ${he(aN)} — מונדיאל 2026`);
  const calDetails=encodeURIComponent(`בית ${grp} · 📺 ${bc}`);
  const gcal=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${calTitle}&dates=${dtStart}/${dtEnd}&details=${calDetails}`;
  const ics=`data:text/calendar;charset=utf8,BEGIN:VCALENDAR%0AVERSION:2.0%0ABEGIN:VEVENT%0ADTSTART:${dtStart}%0ADTEND:${dtEnd}%0ASUMMARY:${calTitle}%0AEND:VEVENT%0AEND:VCALENDAR`;

  // Build info-row: broadcast left-aligned under RSA, city right-aligned under MEX
  const infoRow=`<div class="info-row">
    <div class="info-cell" style="flex:1;text-align:right">
      <div class="val">📺 ${bc}</div><div class="lbl">שידור</div>
    </div>
    <div class="info-cell" style="flex:1;text-align:center;border-left:1px solid var(--border)">
      <div class="val">${m.venue||'—'}</div><div class="lbl">אצטדיון</div>
    </div>
    <div class="info-cell" style="flex:1;text-align:left">
      <div class="val">${m.area?.name||'—'}</div><div class="lbl">עיר</div>
    </div>
  </div>`;

  document.getElementById('match-content').innerHTML=`
    <div class="mblock">
      <div class="match-hero">
        <div class="hero-group">⚽ בית ${grp} · משחק ${m.matchday||''}</div>
        <div class="hero-teams">
          <div class="hero-team">
            <img class="hero-crest" src="${crest(m.homeTeam)}" onerror="this.style.opacity=0">
            <div class="hero-tla">${tla(hN)}</div>
            <div class="hero-name">${he(hN)}</div>
          </div>
          <div class="hero-vs">${vsHtml}</div>
          <div class="hero-team">
            <img class="hero-crest" src="${crest(m.awayTeam)}" onerror="this.style.opacity=0">
            <div class="hero-tla">${tla(aN)}</div>
            <div class="hero-name">${he(aN)}</div>
          </div>
        </div>
      </div>
      ${infoRow}
    </div>

    ${st!=='FINISHED'?`<div class="mblock"><div class="cd-box"><div style="font-size:11px;color:var(--muted);margin-bottom:10px">ספירה לאחור שריקת הפתיחה</div><div class="cd-nums">
      <div class="cd-item"><span class="cd-num" id="cd-h">00</span><div class="cd-lbl">שעות</div></div>
      <div class="cd-item"><span class="cd-num" id="cd-m">00</span><div class="cd-lbl">דקות</div></div>
      <div class="cd-item"><span class="cd-num" id="cd-s">00</span><div class="cd-lbl">שניות</div></div>
    </div></div></div>`:''}

    <div class="mblock">
      <div class="group-mini-title">🏟 טבלת בית ${grp}</div>
      ${gtHtml}
    </div>

    <div class="match-section-title">🔮 ניחושי החברים</div>
    ${predsHtml}
    ${st!=='FINISHED'&&st!=='IN_PLAY'&&st!=='PAUSED'?`<button class="add-pred-btn" onclick="openModal(${m.id})">🔮 הוסף את הניחוש שלי</button>`:''}

    <div class="match-section-title">📅 הוסף ליומן</div>
    <a class="cal-btn cal-g" href="${gcal}" target="_blank">📅 Google Calendar</a>
    <a class="cal-btn cal-a" href="${ics}" download="match.ics">🍎 Apple Calendar</a>
    <div class="match-pb"></div>
  `;

  showPage('match');
  if(st!=='FINISHED') startCountdown(m.utcDate);
}

function startCountdown(utc){
  if(cdTimer) clearInterval(cdTimer);
  const target=new Date(utc);
  function tick(){
    const diff=target-new Date();
    if(!document.getElementById('cd-h')) return;
    if(diff<=0){['h','m','s'].forEach(x=>{const el=document.getElementById('cd-'+x);if(el)el.textContent='00';});clearInterval(cdTimer);return;}
    document.getElementById('cd-h').textContent=String(Math.floor(diff/3600000)).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-s').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  tick(); cdTimer=setInterval(tick,1000);
}

// ── RENDER GROUPS ──
function renderGroups(){
  const groupTeams={}, teamStats={};
  allMatches.filter(m=>m.stage==='GROUP_STAGE').forEach(m=>{
    const grp=(m.group||'').replace('GROUP_','');
    const hN=m.homeTeam?.name||'?', aN=m.awayTeam?.name||'?';
    if(!groupTeams[grp]) groupTeams[grp]=[];
    if(!groupTeams[grp].find(t=>t.name===hN)) groupTeams[grp].push(m.homeTeam);
    if(!groupTeams[grp].find(t=>t.name===aN)) groupTeams[grp].push(m.awayTeam);
    if(!teamStats[hN]) teamStats[hN]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,crest:m.homeTeam?.crest||''};
    if(!teamStats[aN]) teamStats[aN]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,crest:m.awayTeam?.crest||''};
    if(m.status==='FINISHED'){
      const gh=m.score?.fullTime?.home, ga=m.score?.fullTime?.away;
      if(gh===null||gh===undefined) return;
      teamStats[hN].p++; teamStats[aN].p++;
      teamStats[hN].gf+=gh; teamStats[hN].ga+=ga;
      teamStats[aN].gf+=ga; teamStats[aN].ga+=gh;
      if(gh>ga){teamStats[hN].w++;teamStats[hN].pts+=3;teamStats[aN].l++;}
      else if(gh===ga){teamStats[hN].d++;teamStats[hN].pts++;teamStats[aN].d++;teamStats[aN].pts++;}
      else{teamStats[aN].w++;teamStats[aN].pts+=3;teamStats[hN].l++;}
    }
  });
  const sorted=Object.keys(groupTeams).sort();
  if(!sorted.length){document.getElementById('groups-content').innerHTML='<div class="empty">טבלאות יתעדכנו עם תחילת המשחקים</div>';return;}
  let html='<div class="groups-grid">';
  sorted.forEach(grp=>{
    const teams=(groupTeams[grp]||[]).sort((a,b)=>{
      const sa=teamStats[a.name]||{}, sb=teamStats[b.name]||{};
      if((sb.pts||0)!==(sa.pts||0)) return (sb.pts||0)-(sa.pts||0);
      return((sb.gf||0)-(sb.ga||0))-((sa.gf||0)-(sa.ga||0));
    });
    html+=`<div class="group-card"><div class="group-card-title">בית ${grp}</div><table class="gt"><tr><th>נבחרת</th><th>מ'</th><th>נ</th><th>ת</th><th>ה</th><th>±</th><th>נק'</th></tr>`;
    teams.forEach((t,i)=>{
      const s=teamStats[t.name]||{p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
      const gd=s.gf-s.ga;
      html+=`<tr class="${i<2?'q':''}"><td><img class="sm-crest" src="${t.crest||''}" onerror="this.style.display='none'"> ${he(t.name||'')}</td><td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${gd>0?'+':''}${gd}</td><td class="pts">${s.pts}</td></tr>`;
    });
    html+='</table></div>';
  });
  html+='</div>';
  document.getElementById('groups-content').innerHTML=html;
}

// ── LEADERBOARD ──
function renderLeaderboard(){
  const scores={};let done=0;
  const allNames=new Set();
  Object.values(predictions).forEach(mp=>Object.keys(mp).forEach(n=>allNames.add(n)));
  allMatches.forEach(m=>{
    if(m.status!=='FINISHED') return;
    const hs=m.score?.fullTime?.home, as_=m.score?.fullTime?.away;
    if(hs===null||hs===undefined) return;
    done++;
    Object.entries(predictions[m.id]||{}).forEach(([name,p])=>{
      if(!scores[name]) scores[name]={pts:0,exact:0,dir:0,pending:0};
      const exact=p.home===hs&&p.away===as_;
      const dir=(p.home>p.away&&hs>as_)||(p.home<p.away&&hs<as_)||(p.home===p.away&&hs===as_);
      if(exact){scores[name].pts+=3;scores[name].exact++;}
      else if(dir){scores[name].pts+=1;scores[name].dir++;}
    });
  });
  allNames.forEach(name=>{
    if(!scores[name]) scores[name]={pts:0,exact:0,dir:0,pending:0};
    let pending=0;
    Object.entries(predictions).forEach(([mid,mp])=>{
      if(mp[name]){const m=allMatches.find(x=>x.id==mid);if(m&&m.status!=='FINISHED')pending++;}
    });
    scores[name].pending=pending;
  });
  document.getElementById('lb-games-count').textContent=`${done} משחקים סיימו`;
  const sorted=Object.entries(scores).sort((a,b)=>b[1].pts-a[1].pts);
  if(!sorted.length){document.getElementById('lb-content').innerHTML='<div class="empty">אין תחזיות עדיין<br><small>לחץ על משחק כדי לנחש תוצאה 🔮</small></div>';return;}
  const medals=['🥇','🥈','🥉'];
  document.getElementById('lb-content').innerHTML=`<div class="lb-card">${sorted.map(([name,s],i)=>`
    <div class="lb-row">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div><div class="lb-name">${name}</div><div class="lb-detail">מדויק: ${s.exact} ✓✓ · כיוון: ${s.dir} ✓ · ממתין: ${s.pending} ⏳</div></div>
      <div class="lb-pts">${s.pts} נק'</div>
    </div>`).join('')}</div>`;
}

// ── STATS ──
function renderStats(){
  const played=allMatches.filter(m=>m.status==='FINISHED').length;
  const total=allMatches.filter(m=>m.stage==='GROUP_STAGE').length;
  let totalGoals=0,maxGoals=0,maxMatch=null;const gbt={};
  allMatches.forEach(m=>{
    if(m.status!=='FINISHED') return;
    const hs=m.score?.fullTime?.home,as_=m.score?.fullTime?.away;
    if(hs===null||hs===undefined) return;
    const g=hs+as_; totalGoals+=g;
    gbt[m.homeTeam?.name]=(gbt[m.homeTeam?.name]||0)+hs;
    gbt[m.awayTeam?.name]=(gbt[m.awayTeam?.name]||0)+as_;
    if(g>maxGoals){maxGoals=g;maxMatch=m;}
  });
  const avg=played>0?(totalGoals/played).toFixed(1):'—';
  const top=Object.entries(gbt).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8);
  let html=`<div class="stats-bar">
    <div class="stat-item"><div class="stat-num">${played}/${total}</div><div class="stat-label">משחקים שוחקו</div></div>
    <div class="stat-item"><div class="stat-num">${totalGoals}</div><div class="stat-label">סה"כ שערים</div></div>
    <div class="stat-item"><div class="stat-num">${avg}</div><div class="stat-label">שערים למשחק</div></div>
  </div>`;
  if(top.length){
    html+='<div class="lb-card"><div class="lb-header">⚽ מובילות בשערים</div>';
    top.forEach(([t,g])=>{
      const pct=Math.min(Math.round((g/Math.max(totalGoals,1))*300),100);
      html+=`<div class="lb-row" style="gap:8px"><span style="min-width:90px;font-size:13px">${he(t)}</span><div style="flex:1;background:var(--surface2);border-radius:4px;height:8px"><div style="width:${pct}%;background:var(--accent);height:8px;border-radius:4px"></div></div><span style="font-weight:900;color:var(--accent);min-width:20px">${g}</span></div>`;
    });
    html+='</div>';
  }
  if(!played) html+='<div class="empty">סטטיסטיקות יופיעו אחרי המשחק הראשון ⚽</div>';
  document.getElementById('stats-content').innerHTML=html;
}

// ── MODAL ──
function openModal(id){
  const m=allMatches.find(x=>x.id===id); if(!m) return;
  if(m.status==='IN_PLAY'||m.status==='PAUSED'||m.status==='FINISHED'){alert('לא ניתן לנחש לאחר תחילת המשחק');return;}
  currentMatchId=id;
  const hN=m.homeTeam?.name||'?', aN=m.awayTeam?.name||'?';
  document.getElementById('modal-teams').innerHTML=`${he(hN)} נגד ${he(aN)}`;
  document.getElementById('pred-name').value=localStorage.getItem('wc2026_myname')||'';
  document.getElementById('pred-home').value='';
  document.getElementById('pred-away').value='';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('pred-home').focus(),100);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');currentMatchId=null;}
function savePrediction(){
  const name=document.getElementById('pred-name').value.trim();
  const h=parseInt(document.getElementById('pred-home').value);
  const a=parseInt(document.getElementById('pred-away').value);
  if(!name){alert('הכנס שם');return;}
  if(isNaN(h)||isNaN(a)||h<0||a<0){alert('הכנס תוצאה תקינה');return;}
  localStorage.setItem('wc2026_myname',name);
  if(!predictions[currentMatchId]) predictions[currentMatchId]={};
  predictions[currentMatchId][name]={home:h,away:a,ts:Date.now()};
  savePreds(); closeModal(); renderScores(); renderLeaderboard();
  // If on match page, refresh it
  if(document.getElementById('page-match').classList.contains('active')) showMatch(currentMatchId);
}
function deletePrediction(matchId,name){
  if(!confirm(`למחוק את הניחוש של ${name}?`)) return;
  if(predictions[matchId]){delete predictions[matchId][name];if(!Object.keys(predictions[matchId]).length)delete predictions[matchId];}
  savePreds(); renderScores(); renderLeaderboard();
}

// ── PAGES ──
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  ['scores','groups','leaderboard','stats'].forEach((n,i)=>{
    if(n===p) document.querySelectorAll('.tab')[i].classList.add('active');
  });
  if(p!=='match') window.scrollTo(0,0);
}

// ── THEME ──
function toggleTheme(){
  const isDark=document.body.classList.contains('dark');
  document.body.className=isDark?'light':'dark';
  document.getElementById('theme-btn').textContent=isDark?'🌙':'☀️';
  localStorage.setItem('wc2026_theme',isDark?'light':'dark');
}
const savedTheme=localStorage.getItem('wc2026_theme');
if(savedTheme){document.body.className=savedTheme;document.getElementById('theme-btn').textContent=savedTheme==='light'?'🌙':'☀️';}

loadAll();
setInterval(loadAll,60000);

// Register Service Worker
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW error:', e));
}
</script>
